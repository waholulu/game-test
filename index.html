<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尖塔杀机 - Slay the Spire Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#game-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: linear-gradient(180deg, #0d1117 0%, #1a1a2e 50%, #16213e 100%);
}

/* ========== OVERLAYS ========== */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10, 10, 26, 0.95);
  z-index: 100;
  transition: opacity 0.3s;
}
.overlay.hidden { display: none; }

/* Title Screen */
#title-screen h1 {
  font-size: 4rem;
  color: #ff6b6b;
  text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
#title-screen .subtitle {
  font-size: 1.2rem;
  color: #888;
  margin-bottom: 3rem;
}

.btn {
  padding: 14px 48px;
  font-size: 1.2rem;
  border: 2px solid #ff6b6b;
  background: transparent;
  color: #ff6b6b;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:hover {
  background: #ff6b6b;
  color: #0a0a1a;
  transform: scale(1.05);
}
.btn-secondary {
  border-color: #4ecdc4;
  color: #4ecdc4;
}
.btn-secondary:hover {
  background: #4ecdc4;
  color: #0a0a1a;
}
.btn-skip {
  border-color: #666;
  color: #666;
  padding: 10px 30px;
  font-size: 1rem;
}
.btn-skip:hover {
  background: #666;
  color: #0a0a1a;
}

/* Map Screen */
#map-screen {
  background: rgba(10, 10, 26, 0.97);
}
#map-screen h2 {
  font-size: 2rem;
  color: #4ecdc4;
  margin-bottom: 2rem;
}
.map-path {
  display: flex;
  align-items: center;
  gap: 20px;
}
.map-node {
  width: 120px;
  height: 120px;
  border: 3px solid #333;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(30, 30, 50, 0.8);
  position: relative;
}
.map-node .node-icon { font-size: 2.5rem; }
.map-node .node-label { font-size: 0.85rem; color: #aaa; margin-top: 6px; }
.map-node.available {
  border-color: #ff6b6b;
  box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
}
.map-node.available:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
}
.map-node.completed {
  border-color: #4ecdc4;
  opacity: 0.6;
}
.map-node.completed::after {
  content: '✓';
  position: absolute;
  top: -10px;
  right: -10px;
  background: #4ecdc4;
  color: #0a0a1a;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.map-node.locked {
  opacity: 0.3;
  cursor: not-allowed;
}
.map-connector {
  width: 60px;
  height: 3px;
  background: #333;
}
.map-connector.active { background: #4ecdc4; }

.map-player-info {
  margin-top: 2rem;
  font-size: 1rem;
  color: #aaa;
}
.map-player-info span { color: #ff6b6b; font-weight: bold; }

/* ========== COMBAT SCREEN ========== */
#combat-screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px;
}
#combat-screen.hidden { display: none; }

/* Top Bar */
#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 0 40px;
  height: 80px;
}

.entity-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 250px;
}
.entity-name {
  font-size: 1.1rem;
  font-weight: bold;
}
.hp-bar-container {
  width: 100%;
  height: 24px;
  background: #2a2a3a;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
.hp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c0392b, #e74c3c);
  border-radius: 12px;
  transition: width 0.4s ease;
}
.hp-bar-block {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, #2980b9, #3498db);
  border-radius: 12px;
  transition: width 0.4s ease;
  opacity: 0.8;
}
.hp-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

.block-display {
  font-size: 0.9rem;
  color: #3498db;
}
.status-display {
  font-size: 0.85rem;
  color: #f39c12;
  min-height: 1.2em;
}

/* Battlefield */
#battlefield {
  flex: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 80px;
  position: relative;
}

.sprite {
  font-size: 5rem;
  text-align: center;
  transition: transform 0.1s;
  position: relative;
}
.sprite.shake {
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

.enemy-intent {
  text-align: center;
  font-size: 1.1rem;
  margin-top: 10px;
  padding: 6px 14px;
  border-radius: 8px;
  background: rgba(40, 40, 60, 0.8);
  display: inline-block;
}
.intent-attack { color: #e74c3c; }
.intent-defend { color: #3498db; }
.intent-buff { color: #f39c12; }

/* Message Log */
#message-log {
  text-align: center;
  min-height: 28px;
  font-size: 0.95rem;
  color: #aaa;
  padding: 8px;
  transition: all 0.3s;
}

/* Hand Area */
#hand-area {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px 20px;
  min-height: 200px;
  align-items: flex-end;
}

.card {
  width: 130px;
  height: 185px;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  position: relative;
  background: linear-gradient(135deg, #1e1e30 0%, #2a2a40 100%);
  border: 2px solid #444;
  flex-shrink: 0;
}
.card:hover {
  transform: translateY(-25px) scale(1.08);
  z-index: 10;
}
.card.unplayable {
  opacity: 0.5;
  cursor: not-allowed;
}
.card.unplayable:hover {
  transform: none;
}
.card.card-attack { border-color: #c0392b; }
.card.card-skill { border-color: #2980b9; }

.card-cost {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1rem;
}
.card-attack .card-cost {
  background: #c0392b;
  color: white;
}
.card-skill .card-cost {
  background: #2980b9;
  color: white;
}

.card-name {
  font-size: 0.85rem;
  font-weight: bold;
  text-align: center;
  margin-top: 10px;
  margin-bottom: auto;
}
.card-attack .card-name { color: #e74c3c; }
.card-skill .card-name { color: #3498db; }

.card-type {
  font-size: 0.7rem;
  text-align: center;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 0.75rem;
  text-align: center;
  color: #ccc;
  line-height: 1.3;
  margin-bottom: 5px;
}

/* Card play animation */
.card.playing {
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform: translateY(-300px) scale(0.5) !important;
  opacity: 0;
  pointer-events: none;
}

/* Bottom Bar */
#bottom-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  padding: 10px 40px;
}

.energy-orb {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f1c40f, #e67e22, #d35400);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
}

.pile-info {
  font-size: 0.9rem;
  color: #888;
}
.pile-info span { color: #ccc; font-weight: bold; }

#end-turn-btn {
  padding: 12px 36px;
  font-size: 1.1rem;
  border: 2px solid #e67e22;
  background: transparent;
  color: #e67e22;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: inherit;
}
#end-turn-btn:hover {
  background: #e67e22;
  color: #0a0a1a;
}
#end-turn-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
#end-turn-btn:disabled:hover {
  background: transparent;
  color: #e67e22;
}

/* Reward Screen */
#reward-screen h2 {
  font-size: 2rem;
  color: #f1c40f;
  margin-bottom: 0.5rem;
}
#reward-screen .reward-subtitle {
  color: #888;
  margin-bottom: 2rem;
}
#reward-cards {
  display: flex;
  gap: 20px;
  margin-bottom: 2rem;
}
#reward-cards .card {
  width: 150px;
  height: 210px;
}
#reward-cards .card:hover {
  transform: translateY(-15px) scale(1.1);
  box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
}

/* Game Over / Victory */
#gameover-screen h2 {
  font-size: 3rem;
  color: #e74c3c;
  margin-bottom: 1rem;
}
#gameover-screen .death-msg {
  color: #888;
  margin-bottom: 2rem;
  font-size: 1.1rem;
}

#victory-screen h2 {
  font-size: 3rem;
  color: #f1c40f;
  text-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
  margin-bottom: 1rem;
}
#victory-screen .victory-msg {
  color: #aaa;
  margin-bottom: 2rem;
  font-size: 1.1rem;
}

/* Floating damage numbers */
.float-text {
  position: absolute;
  font-weight: bold;
  font-size: 1.5rem;
  pointer-events: none;
  animation: floatUp 1s ease forwards;
  z-index: 200;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.float-damage { color: #e74c3c; }
.float-block { color: #3498db; }
.float-heal { color: #2ecc71; }
.float-buff { color: #f39c12; }

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* Turn banner */
.turn-banner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  font-weight: bold;
  color: #f1c40f;
  text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
  pointer-events: none;
  animation: bannerFade 1s ease forwards;
  z-index: 150;
}
@keyframes bannerFade {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<div id="game-container">
  <!-- Title Screen -->
  <div id="title-screen" class="overlay">
    <h1>尖塔杀机</h1>
    <p class="subtitle">Slay the Spire Demo</p>
    <button class="btn" id="start-btn">开始冒险</button>
  </div>

  <!-- Map Screen -->
  <div id="map-screen" class="overlay hidden">
    <h2>— 选择你的路径 —</h2>
    <div class="map-path" id="map-path"></div>
    <div class="map-player-info">
      ❤️ 生命值: <span id="map-hp"></span>
    </div>
  </div>

  <!-- Reward Screen -->
  <div id="reward-screen" class="overlay hidden">
    <h2>⚔️ 战斗胜利!</h2>
    <p class="reward-subtitle">选择一张卡牌加入你的牌组</p>
    <div id="reward-cards"></div>
    <button class="btn btn-skip" id="skip-reward-btn">跳过</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" class="overlay hidden">
    <h2>💀 你死了</h2>
    <p class="death-msg" id="death-msg"></p>
    <button class="btn" id="retry-btn">重新开始</button>
  </div>

  <!-- Victory Screen -->
  <div id="victory-screen" class="overlay hidden">
    <h2>🏆 通关!</h2>
    <p class="victory-msg">你击败了所有敌人，征服了尖塔！</p>
    <button class="btn btn-secondary" id="victory-restart-btn">再来一次</button>
  </div>

  <!-- Combat Screen -->
  <div id="combat-screen" class="hidden">
    <div id="top-bar">
      <div class="entity-info" id="player-info">
        <div class="entity-name">⚔️ 战士</div>
        <div class="hp-bar-container">
          <div class="hp-bar-fill" id="player-hp-fill"></div>
          <div class="hp-bar-block" id="player-block-fill"></div>
          <div class="hp-text" id="player-hp-text"></div>
        </div>
        <div class="block-display" id="player-block-text"></div>
        <div class="status-display" id="player-status-text"></div>
      </div>
      <div class="entity-info" id="enemy-info" style="text-align: right;">
        <div class="entity-name" id="enemy-name"></div>
        <div class="hp-bar-container">
          <div class="hp-bar-fill" id="enemy-hp-fill"></div>
          <div class="hp-bar-block" id="enemy-block-fill"></div>
          <div class="hp-text" id="enemy-hp-text"></div>
        </div>
        <div class="block-display" id="enemy-block-text"></div>
        <div class="status-display" id="enemy-status-text"></div>
      </div>
    </div>

    <div id="battlefield">
      <div>
        <div class="sprite" id="player-sprite">🧙</div>
      </div>
      <div style="text-align: center;">
        <div class="sprite" id="enemy-sprite"></div>
        <div class="enemy-intent" id="enemy-intent"></div>
      </div>
    </div>

    <div id="message-log"></div>

    <div id="hand-area"></div>

    <div id="bottom-bar">
      <div class="pile-info">抽牌堆: <span id="draw-count">0</span></div>
      <div class="energy-orb" id="energy-orb">3/3</div>
      <button id="end-turn-btn">结束回合</button>
      <div class="pile-info">弃牌堆: <span id="discard-count">0</span></div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
