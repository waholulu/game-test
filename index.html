<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>尖塔杀机 - Slay the Spire Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

#game-container {
  width: 100%;
  height: 100%;
  position: relative;
  background: linear-gradient(180deg, #0d1117 0%, #1a1a2e 50%, #16213e 100%);
  overflow: hidden;
}

/* ========== OVERLAYS ========== */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10, 10, 26, 0.95);
  z-index: 100;
  transition: opacity 0.3s;
}
.overlay.hidden { display: none; }

/* Title Screen */
#title-screen h1 {
  font-size: 4rem;
  color: #ff6b6b;
  text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
#title-screen .subtitle {
  font-size: 1.2rem;
  color: #888;
  margin-bottom: 3rem;
}

.btn {
  padding: 14px 48px;
  font-size: 1.2rem;
  border: 2px solid #ff6b6b;
  background: transparent;
  color: #ff6b6b;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:hover {
  background: #ff6b6b;
  color: #0a0a1a;
  transform: scale(1.05);
}
.btn-secondary {
  border-color: #4ecdc4;
  color: #4ecdc4;
}
.btn-secondary:hover {
  background: #4ecdc4;
  color: #0a0a1a;
}
.btn-skip {
  border-color: #666;
  color: #666;
  padding: 10px 30px;
  font-size: 1rem;
}
.btn-skip:hover {
  background: #666;
  color: #0a0a1a;
}

/* Map Screen */
#map-screen {
  background: rgba(10, 10, 26, 0.97);
}
#map-screen h2 {
  font-size: 2rem;
  color: #4ecdc4;
  margin-bottom: 2rem;
}
.map-path {
  display: flex;
  align-items: center;
  gap: 20px;
}
.map-node {
  width: 120px;
  height: 120px;
  border: 3px solid #333;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(30, 30, 50, 0.8);
  position: relative;
}
.map-node .node-icon { font-size: 2.5rem; }
.map-node .node-label { font-size: 0.85rem; color: #aaa; margin-top: 6px; }
.map-node.available {
  border-color: #ff6b6b;
  box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
}
.map-node.available:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
}
.map-node.completed {
  border-color: #4ecdc4;
  opacity: 0.6;
}
.map-node.completed::after {
  content: '✓';
  position: absolute;
  top: -10px;
  right: -10px;
  background: #4ecdc4;
  color: #0a0a1a;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.map-node.locked {
  opacity: 0.3;
  cursor: not-allowed;
}
.map-connector {
  width: 60px;
  height: 3px;
  background: #333;
}
.map-connector.active { background: #4ecdc4; }

.map-player-info {
  margin-top: 2rem;
  font-size: 1rem;
  color: #aaa;
}
.map-player-info span { color: #ff6b6b; font-weight: bold; }

/* ========== COMBAT SCREEN ========== */
#combat-screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px;
}
#combat-screen.hidden { display: none; }

/* Top Bar */
#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 0 40px;
  height: 80px;
}

.entity-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 250px;
}
.entity-name {
  font-size: 1.1rem;
  font-weight: bold;
}
.hp-bar-container {
  width: 100%;
  height: 24px;
  background: #2a2a3a;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
.hp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c0392b, #e74c3c);
  border-radius: 12px;
  transition: width 0.4s ease;
}
.hp-bar-block {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, #2980b9, #3498db);
  border-radius: 12px;
  transition: width 0.4s ease;
  opacity: 0.8;
}
.hp-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

.block-display {
  font-size: 0.9rem;
  color: #3498db;
}
.status-display {
  font-size: 0.85rem;
  color: #f39c12;
  min-height: 1.2em;
}

/* Battlefield */
#battlefield {
  flex: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 80px;
  position: relative;
}

.sprite {
  font-size: 5rem;
  text-align: center;
  transition: transform 0.1s;
  position: relative;
}
.sprite.shake {
  animation: shake 0.3s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

.enemy-intent {
  text-align: center;
  font-size: 1.1rem;
  margin-top: 10px;
  padding: 6px 14px;
  border-radius: 8px;
  background: rgba(40, 40, 60, 0.8);
  display: inline-block;
}
.intent-attack { color: #e74c3c; }
.intent-defend { color: #3498db; }
.intent-buff { color: #f39c12; }

/* Message Log */
#message-log {
  text-align: center;
  min-height: 28px;
  font-size: 0.95rem;
  color: #aaa;
  padding: 8px;
  transition: all 0.3s;
}

/* Hand Area */
#hand-area {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px 20px;
  min-height: 200px;
  align-items: flex-end;
}

.card {
  width: 130px;
  height: 185px;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  position: relative;
  background: linear-gradient(135deg, #1e1e30 0%, #2a2a40 100%);
  border: 2px solid #444;
  flex-shrink: 0;
}
.card:hover {
  transform: translateY(-25px) scale(1.08);
  z-index: 10;
}
.card.unplayable {
  opacity: 0.5;
  cursor: not-allowed;
}
.card.unplayable:hover {
  transform: none;
}
.card.card-attack { border-color: #c0392b; }
.card.card-skill { border-color: #2980b9; }

.card-cost {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1rem;
}
.card-attack .card-cost {
  background: #c0392b;
  color: white;
}
.card-skill .card-cost {
  background: #2980b9;
  color: white;
}

.card-name {
  font-size: 0.85rem;
  font-weight: bold;
  text-align: center;
  margin-top: 10px;
  margin-bottom: auto;
}
.card-attack .card-name { color: #e74c3c; }
.card-skill .card-name { color: #3498db; }

.card-type {
  font-size: 0.7rem;
  text-align: center;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 0.75rem;
  text-align: center;
  color: #ccc;
  line-height: 1.3;
  margin-bottom: 5px;
}

/* Card play animation */
.card.playing {
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform: translateY(-300px) scale(0.5) !important;
  opacity: 0;
  pointer-events: none;
}

/* Bottom Bar */
#bottom-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  padding: 10px 40px;
}

.energy-orb {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f1c40f, #e67e22, #d35400);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
}

.pile-info {
  font-size: 0.9rem;
  color: #888;
}
.pile-info span { color: #ccc; font-weight: bold; }

#end-turn-btn {
  padding: 12px 36px;
  font-size: 1.1rem;
  border: 2px solid #e67e22;
  background: transparent;
  color: #e67e22;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  font-family: inherit;
}
#end-turn-btn:hover {
  background: #e67e22;
  color: #0a0a1a;
}
#end-turn-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
#end-turn-btn:disabled:hover {
  background: transparent;
  color: #e67e22;
}

/* Reward Screen */
#reward-screen h2 {
  font-size: 2rem;
  color: #f1c40f;
  margin-bottom: 0.5rem;
}
#reward-screen .reward-subtitle {
  color: #888;
  margin-bottom: 2rem;
}
#reward-cards {
  display: flex;
  gap: 20px;
  margin-bottom: 2rem;
}
#reward-cards .card {
  width: 150px;
  height: 210px;
}
#reward-cards .card:hover {
  transform: translateY(-15px) scale(1.1);
  box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
}

/* Game Over / Victory */
#gameover-screen h2 {
  font-size: 3rem;
  color: #e74c3c;
  margin-bottom: 1rem;
}
#gameover-screen .death-msg {
  color: #888;
  margin-bottom: 2rem;
  font-size: 1.1rem;
}

#victory-screen h2 {
  font-size: 3rem;
  color: #f1c40f;
  text-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
  margin-bottom: 1rem;
}
#victory-screen .victory-msg {
  color: #aaa;
  margin-bottom: 2rem;
  font-size: 1.1rem;
}

/* Floating damage numbers */
.float-text {
  position: absolute;
  font-weight: bold;
  font-size: 1.5rem;
  pointer-events: none;
  animation: floatUp 1s ease forwards;
  z-index: 200;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.float-damage { color: #e74c3c; }
.float-block { color: #3498db; }
.float-heal { color: #2ecc71; }
.float-buff { color: #f39c12; }

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* Turn banner */
.turn-banner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  font-weight: bold;
  color: #f1c40f;
  text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
  pointer-events: none;
  animation: bannerFade 1s ease forwards;
  z-index: 150;
}
@keyframes bannerFade {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}

/* ========== MOBILE: Touch & Active States ========== */
.btn:active {
  background: #ff6b6b;
  color: #0a0a1a;
  transform: scale(0.95);
}
.btn-secondary:active {
  background: #4ecdc4;
  color: #0a0a1a;
}
.btn-skip:active {
  background: #666;
  color: #0a0a1a;
}
#end-turn-btn:active:not(:disabled) {
  background: #e67e22;
  color: #0a0a1a;
}
.card:active:not(.unplayable) {
  transform: translateY(-15px) scale(1.05);
  z-index: 10;
}
.map-node.available:active {
  transform: scale(0.95);
  box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
}

/* ========== MOBILE: Portrait Phones (max-width: 600px) ========== */
@media (max-width: 600px) {
  /* Title */
  #title-screen h1 {
    font-size: 2.4rem;
  }
  #title-screen .subtitle {
    font-size: 1rem;
    margin-bottom: 2rem;
  }
  .btn {
    padding: 16px 40px;
    font-size: 1.1rem;
    min-height: 48px;
  }

  /* Map */
  #map-screen h2 {
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }
  .map-path {
    gap: 10px;
  }
  .map-node {
    width: 85px;
    height: 85px;
    border-radius: 12px;
  }
  .map-node .node-icon { font-size: 1.8rem; }
  .map-node .node-label { font-size: 0.75rem; }
  .map-connector { width: 30px; }
  .map-node.completed::after {
    width: 22px;
    height: 22px;
    font-size: 0.8rem;
  }

  /* Combat Screen */
  #combat-screen {
    padding: 8px 4px;
  }

  /* Top Bar */
  #top-bar {
    padding: 0 8px;
    height: auto;
    gap: 8px;
  }
  .entity-info {
    min-width: 0;
    flex: 1;
    gap: 3px;
  }
  .entity-name {
    font-size: 0.85rem;
  }
  .hp-bar-container {
    height: 20px;
  }
  .hp-text {
    font-size: 0.7rem;
  }
  .block-display {
    font-size: 0.75rem;
  }
  .status-display {
    font-size: 0.7rem;
  }

  /* Battlefield */
  #battlefield {
    padding: 0 20px;
    flex: 1;
    min-height: 0;
  }
  .sprite {
    font-size: 3.5rem;
  }
  .enemy-intent {
    font-size: 0.85rem;
    padding: 4px 10px;
    margin-top: 6px;
  }

  /* Message Log */
  #message-log {
    font-size: 0.8rem;
    padding: 4px;
    min-height: 22px;
  }

  /* Hand Area - horizontal scroll */
  #hand-area {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
    gap: 8px;
    padding: 6px 12px 10px;
    min-height: 145px;
    justify-content: flex-start;
  }
  #hand-area::after {
    content: '';
    flex-shrink: 0;
    width: 12px;
  }

  /* Cards - smaller on mobile */
  .card {
    width: 100px;
    height: 140px;
    padding: 8px 6px;
    border-radius: 8px;
    scroll-snap-align: center;
    flex-shrink: 0;
  }
  .card:hover {
    transform: none;
  }
  .card:active:not(.unplayable) {
    transform: translateY(-10px) scale(1.05);
  }
  .card-cost {
    width: 24px;
    height: 24px;
    font-size: 0.8rem;
    top: -6px;
    left: -6px;
  }
  .card-name {
    font-size: 0.75rem;
    margin-top: 6px;
  }
  .card-type {
    font-size: 0.6rem;
    margin-bottom: 3px;
  }
  .card-desc {
    font-size: 0.6rem;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  /* Bottom Bar */
  #bottom-bar {
    padding: 6px 10px;
    gap: 12px;
  }
  .energy-orb {
    width: 46px;
    height: 46px;
    font-size: 1.1rem;
  }
  .pile-info {
    font-size: 0.75rem;
  }
  #end-turn-btn {
    padding: 10px 20px;
    font-size: 0.95rem;
    min-height: 44px;
  }

  /* Reward */
  #reward-screen h2 {
    font-size: 1.5rem;
  }
  #reward-screen .reward-subtitle {
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
  }
  #reward-cards {
    gap: 12px;
  }
  #reward-cards .card {
    width: 105px;
    height: 150px;
  }
  #reward-cards .card:hover {
    transform: none;
  }
  #reward-cards .card:active {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
  }

  /* Game Over / Victory */
  #gameover-screen h2 {
    font-size: 2rem;
  }
  #gameover-screen .death-msg {
    font-size: 0.95rem;
    padding: 0 20px;
    text-align: center;
  }
  #victory-screen h2 {
    font-size: 2rem;
  }
  #victory-screen .victory-msg {
    font-size: 0.95rem;
  }

  /* Floating text */
  .float-text {
    font-size: 1.2rem;
  }
  .turn-banner {
    font-size: 1.4rem;
  }
}

/* ========== MOBILE: Very small phones (max-width: 380px) ========== */
@media (max-width: 380px) {
  #title-screen h1 {
    font-size: 2rem;
  }
  .map-node {
    width: 70px;
    height: 70px;
  }
  .map-node .node-icon { font-size: 1.5rem; }
  .map-connector { width: 20px; }

  .card {
    width: 88px;
    height: 125px;
  }
  .card-name { font-size: 0.7rem; }
  .card-desc { font-size: 0.55rem; }

  .sprite { font-size: 3rem; }

  #reward-cards .card {
    width: 90px;
    height: 130px;
  }
}

/* ========== MOBILE: Landscape phones ========== */
@media (max-height: 500px) and (orientation: landscape) {
  #combat-screen {
    padding: 4px;
    flex-direction: row;
    flex-wrap: wrap;
  }
  #top-bar {
    width: 100%;
    height: auto;
    padding: 0 8px;
  }
  #battlefield {
    flex: 1;
    padding: 0 20px;
    min-height: 80px;
  }
  .sprite { font-size: 2.5rem; }
  #message-log {
    width: 100%;
    min-height: 18px;
    font-size: 0.75rem;
    padding: 2px;
  }
  #hand-area {
    min-height: 100px;
    padding: 2px 8px 4px;
  }
  .card {
    width: 80px;
    height: 105px;
    padding: 4px;
  }
  .card-cost {
    width: 20px;
    height: 20px;
    font-size: 0.7rem;
    top: -4px;
    left: -4px;
  }
  .card-name { font-size: 0.65rem; margin-top: 4px; }
  .card-type { display: none; }
  .card-desc { font-size: 0.55rem; }
  #bottom-bar {
    width: 100%;
    padding: 2px 10px;
    gap: 10px;
  }
  .energy-orb {
    width: 36px;
    height: 36px;
    font-size: 0.9rem;
  }
  #end-turn-btn {
    padding: 6px 16px;
    font-size: 0.85rem;
    min-height: 36px;
  }
  .pile-info { font-size: 0.7rem; }
  .hp-bar-container { height: 16px; }
  .hp-text { font-size: 0.6rem; }
  .entity-name { font-size: 0.75rem; }

  /* Overlays in landscape */
  #title-screen h1 { font-size: 2rem; }
  #title-screen .subtitle { margin-bottom: 1rem; }
  #reward-cards .card {
    width: 85px;
    height: 115px;
  }
}

/* ========== Tablets (601px - 900px) ========== */
@media (min-width: 601px) and (max-width: 900px) {
  #top-bar { padding: 0 20px; }
  .entity-info { min-width: 200px; }
  #battlefield { padding: 0 40px; }
  .sprite { font-size: 4rem; }
  .card {
    width: 115px;
    height: 165px;
  }
  #hand-area { gap: 8px; min-height: 175px; }
  #bottom-bar { gap: 20px; }
}
</style>
</head>
<body>

<div id="game-container">
  <!-- Title Screen -->
  <div id="title-screen" class="overlay">
    <h1>尖塔杀机</h1>
    <p class="subtitle">Slay the Spire Demo</p>
    <button class="btn" id="start-btn">开始冒险</button>
  </div>

  <!-- Map Screen -->
  <div id="map-screen" class="overlay hidden">
    <h2>— 选择你的路径 —</h2>
    <div class="map-path" id="map-path"></div>
    <div class="map-player-info">
      ❤️ 生命值: <span id="map-hp"></span>
    </div>
  </div>

  <!-- Reward Screen -->
  <div id="reward-screen" class="overlay hidden">
    <h2>⚔️ 战斗胜利!</h2>
    <p class="reward-subtitle">选择一张卡牌加入你的牌组</p>
    <div id="reward-cards"></div>
    <button class="btn btn-skip" id="skip-reward-btn">跳过</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" class="overlay hidden">
    <h2>💀 你死了</h2>
    <p class="death-msg" id="death-msg"></p>
    <button class="btn" id="retry-btn">重新开始</button>
  </div>

  <!-- Victory Screen -->
  <div id="victory-screen" class="overlay hidden">
    <h2>🏆 通关!</h2>
    <p class="victory-msg">你击败了所有敌人，征服了尖塔！</p>
    <button class="btn btn-secondary" id="victory-restart-btn">再来一次</button>
  </div>

  <!-- Combat Screen -->
  <div id="combat-screen" class="hidden">
    <div id="top-bar">
      <div class="entity-info" id="player-info">
        <div class="entity-name">⚔️ 战士</div>
        <div class="hp-bar-container">
          <div class="hp-bar-fill" id="player-hp-fill"></div>
          <div class="hp-bar-block" id="player-block-fill"></div>
          <div class="hp-text" id="player-hp-text"></div>
        </div>
        <div class="block-display" id="player-block-text"></div>
        <div class="status-display" id="player-status-text"></div>
      </div>
      <div class="entity-info" id="enemy-info" style="text-align: right;">
        <div class="entity-name" id="enemy-name"></div>
        <div class="hp-bar-container">
          <div class="hp-bar-fill" id="enemy-hp-fill"></div>
          <div class="hp-bar-block" id="enemy-block-fill"></div>
          <div class="hp-text" id="enemy-hp-text"></div>
        </div>
        <div class="block-display" id="enemy-block-text"></div>
        <div class="status-display" id="enemy-status-text"></div>
      </div>
    </div>

    <div id="battlefield">
      <div>
        <div class="sprite" id="player-sprite">🧙</div>
      </div>
      <div style="text-align: center;">
        <div class="sprite" id="enemy-sprite"></div>
        <div class="enemy-intent" id="enemy-intent"></div>
      </div>
    </div>

    <div id="message-log"></div>

    <div id="hand-area"></div>

    <div id="bottom-bar">
      <div class="pile-info">抽牌堆: <span id="draw-count">0</span></div>
      <div class="energy-orb" id="energy-orb">3/3</div>
      <button id="end-turn-btn">结束回合</button>
      <div class="pile-info">弃牌堆: <span id="discard-count">0</span></div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
